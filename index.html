<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PULSO · Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:     #e8e9ec;
  --srf:    #ffffff;
  --srf2:   #f9fafb;
  --i4l:    #8B6B9F;
  --cli:    #059669;
  --rosa:   #D97B9B;
  --i4l-lt: #F3EFFE;
  --cli-lt: #ECFDF5;
  --blue:   #0071CE;
  --blue2:  #005fa8;
  --yel:    #FFC220;
  --yel2:   #e6ab00;
  --tx0:    #1a2030;
  --tx1:    #4a5568;
  --tx2:    #8896aa;
  --tx3:    #c0c7d4;
  --br:     #c8dff5;
  --br2:    #a0c8e8;
  --br-sub: #e5e7eb;
  --sh:     rgba(0,113,206,0.10);
  --hh:     56px;
  --hf:     42px;
  --r:      12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;
  background:linear-gradient(150deg,#daeeff 0%,#edf4ff 50%,#f0f8ff 100%);
  color:var(--tx0);font-family:'Nunito',sans-serif;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:'Nunito',sans-serif}
.gone{display:none!important}

/* ──────────── LOGIN ──────────── */
#login{position:fixed;inset:0;z-index:50;display:flex;align-items:center;
  justify-content:center;transition:opacity .45s ease}

.card{width:min(390px,92vw);padding:48px 40px 40px;
  background:rgba(255,255,255,0.92);
  border:1.5px solid var(--br2);border-radius:20px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 12px 48px var(--sh),0 2px 8px rgba(0,113,206,0.06);
  animation:rise .55s cubic-bezier(.16,1,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.24em;
  text-transform:uppercase;color:var(--blue);
  border:1.5px solid var(--br2);border-radius:40px;padding:5px 14px;margin-bottom:26px}
.card-title{font-size:40px;font-weight:300;letter-spacing:.04em;color:var(--tx0);
  line-height:1;margin-bottom:6px}
.card-sub{font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:32px}
.rule{height:1px;background:var(--br);margin-bottom:28px}
.fl{display:block;font-size:9px;font-weight:700;letter-spacing:.22em;
  text-transform:uppercase;color:var(--tx2);margin-bottom:8px}
.fi{width:100%;padding:13px 15px;margin-bottom:14px;
  background:var(--srf2);border:1.5px solid var(--br-sub);border-radius:var(--r);
  color:var(--tx0);font-family:'Nunito',sans-serif;font-size:16px;font-weight:500;
  outline:none;transition:border-color .22s,box-shadow .22s;min-height:48px;
  -webkit-appearance:none;appearance:none}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,206,.1)}
.err{font-size:11px;font-weight:600;color:#c0392b;margin-bottom:16px;
  min-height:16px;opacity:0;transition:opacity .22s}
.err.on{opacity:1}
.btn-in{width:100%;padding:15px;background:var(--yel);border:none;
  border-radius:var(--r);color:var(--tx0);font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  min-height:52px;transition:background .2s,transform .2s,box-shadow .2s;
  -webkit-appearance:none;appearance:none}
.btn-in:hover{background:var(--yel2);transform:translateY(-1px);
  box-shadow:0 6px 24px rgba(255,194,32,.38)}
.btn-in:active{transform:translateY(0)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .32s ease}

/* ──────────── PORTAL ──────────── */
#portal{display:flex;flex-direction:column;height:100vh;overflow:hidden}

.ph{height:var(--hh);min-height:var(--hh);display:flex;align-items:center;
  padding:0 14px;gap:10px;background:rgba(255,255,255,0.95);
  border-bottom:2px solid var(--br-sub);position:relative;z-index:10}
.brand{font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--blue);flex-shrink:0}

.tabs{display:flex;align-items:center;gap:2px;background:#f5f7fa;
  border:1.5px solid var(--br-sub);border-radius:100px;padding:3px;
  margin:0 auto;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 16px;border:none;border-radius:100px;background:transparent;
  color:var(--tx2);font-family:'Nunito',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.07em;text-transform:uppercase;transition:all .22s;white-space:nowrap;
  min-height:34px}
.tab:hover{color:var(--blue)}
.tab.on{background:var(--blue);color:#fff;font-weight:700;
  box-shadow:0 2px 10px rgba(0,113,206,.28)}

.edit-btn{flex-shrink:0;padding:7px 13px;background:#f0f7ff;
  border:1.5px solid var(--br2);border-radius:100px;color:var(--blue);
  font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;transition:all .22s;cursor:pointer;min-height:34px}
.edit-btn:hover{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(0,113,206,.32)}
.out-btn{flex-shrink:0;padding:7px 13px;background:transparent;border:none;
  font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;
  color:var(--tx2);text-transform:uppercase;transition:all .22s;cursor:pointer;
  min-height:34px}
.out-btn:hover{color:var(--blue)}

.pm{flex:1;position:relative;overflow:hidden;display:flex;align-items:stretch}
.slider{width:500%;height:100%;display:flex;transition:transform .45s cubic-bezier(.16,1,.3,1);
  will-change:transform}

.panel{width:20%;height:100%;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.ptop{height:var(--hf);padding:0 14px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--br-sub);background:rgba(255,255,255,0.85);flex-shrink:0}
.ppip{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0}
.pname{font-size:13px;font-weight:600;color:var(--tx0);flex:1}
.ptag{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--tx2);padding:3px 8px;background:var(--srf2);border-radius:4px;flex-shrink:0}
.fw{flex:1;overflow:hidden;position:relative;background:var(--srf)}
.shim{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  gap:12px;color:var(--tx2);z-index:1}
.sp{width:28px;height:28px;border:2px solid var(--br);border-radius:50%;
  border-top-color:transparent;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stxt{font-size:11px;font-weight:600}
.shim.done{display:none}
iframe{width:100%;height:100%;border:none}
.plc{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;color:var(--tx2)}
.plc-icon{font-size:48px}
.plc-title{font-size:14px;font-weight:600}
.plc-note{font-size:11px;color:var(--tx3);text-align:center;max-width:240px}

.arr{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;
  padding:0;background:rgba(255,255,255,0.85);border:1px solid var(--br-sub);
  border-radius:100%;font-size:18px;color:var(--tx1);z-index:5;transition:all .22s}
.arr:hover:not(:disabled){background:#fff;box-shadow:0 2px 8px var(--sh)}
.arr:disabled{opacity:.35;cursor:not-allowed}
.al{left:10px}.ar{right:10px}

/* STATUS & CHAT PANELS */
.status-wrap,.chat-wrap{display:flex;flex-direction:column;height:100%;padding:0;
  background:var(--bg);overflow:hidden}
.status-head,.chat-head{height:var(--hf);padding:12px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  border-bottom:1px solid var(--br-sub);background:rgba(255,255,255,0.85);flex-shrink:0}
.status-head h2,.chat-head h2{font-size:13px;font-weight:600;color:var(--tx0);margin:0}
#chatSt{font-size:9px;font-weight:700;color:var(--tx2);text-transform:uppercase;
  letter-spacing:.05em}

.status-list{flex:1;overflow-y:auto;padding:12px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:8px;color:var(--tx2)}
.empty-state span{font-size:32px}
.empty-state p{font-size:11px;text-align:center;max-width:200px}

.status-item{padding:12px;background:var(--srf);border-radius:8px;border:1px solid var(--br-sub);
  margin-bottom:8px;animation:slide .3s ease}
.status-meta{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:6px;font-size:9px;font-weight:600;color:var(--tx2);
  text-transform:uppercase;letter-spacing:.05em}
.status-author{color:var(--blue)}
.status-text{font-size:12px;line-height:1.5;color:var(--tx1)}

/* ──────────── CHAT PANEL v9 (FASE 1 + 2) ──────────── */
.chat-wrap{padding:0;display:grid;grid-template-columns:220px 1fr;overflow:hidden}

.chat-sidebar{background:var(--srf2);border-right:1px solid var(--br-sub);
  display:flex;flex-direction:column;overflow:hidden}
.chat-sidebar-scroll{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}

.sidebar-section{padding-bottom:8px;border-bottom:1px solid var(--br-sub);margin-bottom:8px}
.sidebar-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  color:var(--tx2);padding:0 8px;margin-bottom:8px;display:block}

.participant-item{padding:8px;border-radius:6px;background:var(--srf);border:0.5px solid var(--br-sub);
  display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s;
  animation:slide .3s ease}
.participant-item:hover{background:#f0f7ff;border-color:var(--blue)}
.participant-item.active{background:var(--i4l-lt);border-color:var(--i4l)}
.participant-item.active.cli{background:var(--cli-lt);border-color:var(--cli)}

.participant-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.participant-av.i4l{background:var(--i4l)}
.participant-av.cli{background:var(--cli)}
.participant-av.priv{background:var(--rosa)}

.participant-info{flex:1;min-width:0}
.participant-name{font-size:11px;font-weight:600;color:var(--tx0);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.participant-role{font-size:8px;color:var(--tx2);font-weight:500}

.participant-status{font-size:10px;color:var(--tx3);flex-shrink:0}

/* CHAT MAIN AREA */
.chat-main{display:flex;flex-direction:column;overflow:hidden;background:var(--srf)}

.chat-msgs{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;
  gap:12px;position:relative;background-color:var(--srf)}

/* FONDO WHATSAPP - SVG */
.chat-msgs::before{
  content:'';position:absolute;inset:0;pointer-events:none;opacity:0.08;
  background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><circle cx="150" cy="100" r="120" fill="%238B6B9F" opacity="0.4"/><circle cx="600" cy="250" r="100" fill="%238B6B9F" opacity="0.35"/><circle cx="300" cy="550" r="80" fill="%238B6B9F" opacity="0.3"/><circle cx="1000" cy="250" r="150" fill="%23059669" opacity="0.35"/><circle cx="750" cy="600" r="90" fill="%23059669" opacity="0.3"/><circle cx="600" cy="650" r="100" fill="%23D97B9B" opacity="0.3"/><circle cx="200" cy="400" r="70" fill="%23D97B9B" opacity="0.25"/><path d="M 0 200 Q 300 150, 600 200 T 1200 200" stroke="%238B6B9F" stroke-width="2" fill="none" opacity="0.3"/><path d="M 0 500 Q 400 450, 800 500 T 1200 500" stroke="%23059669" stroke-width="2" fill="none" opacity="0.25"/><path d="M 0 350 Q 300 300, 600 350 T 1200 350" stroke="%23D97B9B" stroke-width="1.5" fill="none" opacity="0.2"/><circle cx="200" cy="180" r="4" fill="%23D97B9B" opacity="0.5"/><circle cx="450" cy="320" r="3" fill="%238B6B9F" opacity="0.4"/><circle cx="750" cy="420" r="2.5" fill="%23059669" opacity="0.35"/><circle cx="950" cy="150" r="3" fill="%23D97B9B" opacity="0.4"/><circle cx="100" cy="600" r="3" fill="%238B6B9F" opacity="0.35"/><circle cx="1100" cy="550" r="2.5" fill="%23059669" opacity="0.4"/><circle cx="600" cy="280" r="3.5" fill="%23D97B9B" opacity="0.35"/><circle cx="850" cy="750" r="2" fill="%238B6B9F" opacity="0.3"/><circle cx="350" cy="700" r="2.5" fill="%23059669" opacity="0.35"/></svg>');
  background-size:cover;background-position:center
}

.brow{position:relative;z-index:1;display:flex;gap:8px;animation:slide .3s ease;max-width:85%}
.brow.cli{align-self:flex-end}

.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:white;flex-shrink:0}
.av.i4l{background:var(--i4l)}
.av.cli{background:var(--cli)}

.bub{flex:1;display:flex;flex-direction:column;gap:2px;padding:10px 12px;border-radius:10px}
.brow.i4l .bub{background:var(--i4l-lt);border-left:3px solid var(--i4l)}
.brow.cli .bub{background:var(--cli-lt);border-right:3px solid var(--cli)}

.bub-who{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--tx0)}
.bub-txt{font-size:12px;line-height:1.5;color:var(--tx1);word-break:break-word;margin:2px 0 0 0}
.bub-ts{font-size:8px;color:var(--tx2);margin-top:3px;display:flex;align-items:center;gap:4px}

.deliver{letter-spacing:1px}

.chat-ctrl{padding:12px;background:var(--srf);border-top:1px solid var(--br-sub);
  flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.chat-para{display:flex;gap:6px;align-items:center;font-size:10px;font-weight:600}
.chat-para label{color:var(--tx2);text-transform:uppercase;letter-spacing:.05em}
.chat-para select{flex:1;padding:6px 8px;border:0.5px solid var(--br-sub);border-radius:4px;
  font-size:10px;color:var(--tx0);background:var(--srf2);cursor:pointer;font-family:'Nunito',sans-serif}
.chat-msg{display:flex;gap:6px}
.chat-msg textarea{flex:1;padding:8px;border:0.5px solid var(--br-sub);border-radius:6px;
  font-family:'Nunito',sans-serif;font-size:11px;color:var(--tx0);resize:vertical;
  min-height:32px;max-height:80px;outline:none;background:var(--srf2)}
.chat-msg textarea:focus{border-color:var(--i4l)}
.send-btn{padding:8px 12px;background:var(--i4l);color:white;border:none;
  border-radius:6px;font-weight:700;font-size:11px;min-height:32px;min-width:32px;
  transition:background .2s;cursor:pointer;flex-shrink:0}
.send-btn:hover{background:#7a5a8d}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
#cerr{font-size:10px;font-weight:600;color:#c0392b;padding:0 8px;
  min-height:14px;opacity:0;transition:opacity .22s}
#cerr.on{opacity:1}

.pf{display:flex;gap:8px;padding:12px;justify-content:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--br);border:none;cursor:pointer;
  transition:all .22s}
.dot.on{background:var(--blue);width:24px;border-radius:100px}

@keyframes slide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <div class="badge">PULSO</div>
    <h1 class="card-title">Capacitación</h1>
    <p class="card-sub">Portal de seguimiento de proyectos</p>
    <div class="rule"></div>
    <label class="fl">Usuario</label>
    <input class="fi" type="text" id="loginUser" placeholder="usuario@dominio.com">
    <label class="fl">Contraseña</label>
    <div style="position:relative;margin-bottom:14px">
      <input class="fi" type="password" id="loginPass" placeholder="contraseña" onkeypress="if(event.key==='Enter')doLogin()" style="padding-right:36px;font-size:16px">
      <button type="button" id="toggleBtn" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:14px;cursor:pointer;color:var(--tx2);opacity:0.6" onclick="togglePassVis()">🔒</button>
    </div>
    <div class="err" id="lerr"></div>
    <button class="btn-in" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="portal" class="gone">
  <div class="ph">
    <span class="brand">✦ PULSO</span>
    <div class="tabs" id="tabsContainer">
      <button class="tab on" onclick="go(0)">📊 Control</button>
      <button class="tab" onclick="go(1)">📈 Gantt</button>
      <button class="tab" onclick="go(2)">🎯 Dashboard</button>
      <button class="tab" onclick="go(3)">📢 Estatus</button>
      <button class="tab" onclick="go(4)">💬 Chat</button>
    </div>
    <button class="edit-btn" onclick="openSheet()" id="editBtn" style="display:none">Editar</button>
    <button class="out-btn" onclick="doLogout()">Salir</button>
  </div>

  <div class="pm" id="pm">
    <div class="slider" id="slider">
      <div class="panel">
        <div class="ptop"><div class="ppip"></div><div class="pname">Control</div><div class="ptag">Inicio</div></div>
        <div class="fw"><div class="shim" id="s0"><div class="sp"></div><div class="stxt">Cargando</div></div><iframe id="f0"></iframe><div class="plc" id="p0"></div></div>
      </div>
      <div class="panel">
        <div class="ptop"><div class="ppip"></div><div class="pname">Diagrama Gantt</div><div class="ptag">Cronograma</div></div>
        <div class="fw"><div class="shim" id="s1"><div class="sp"></div><div class="stxt">Cargando</div></div><iframe id="f1"></iframe><div class="plc" id="p1"></div></div>
      </div>
      <div class="panel">
        <div class="ptop"><div class="ppip"></div><div class="pname">Dashboard</div><div class="ptag">Indicadores</div></div>
        <div class="fw"><div class="shim" id="s2"><div class="sp"></div><div class="stxt">Cargando</div></div><iframe id="f2"></iframe><div class="plc" id="p2"></div></div>
      </div>
      <div class="panel">
        <div class="status-wrap">
          <div class="status-head"><h2>Reportes de avance</h2></div>
          <div id="statusList" class="status-list"></div>
        </div>
      </div>
      <div class="panel">
        <div class="chat-wrap">
          <div class="chat-sidebar">
            <div class="chat-sidebar-scroll">
              <div class="sidebar-section">
                <span class="sidebar-label">Participantes</span>
                <div id="participantsList"></div>
              </div>
              <div class="sidebar-section">
                <span class="sidebar-label">Privados</span>
                <div id="privatesList"></div>
              </div>
            </div>
          </div>
          <div class="chat-main">
            <div class="chat-head"><h2>Mensajes</h2><span id="chatSt">No configurado</span></div>
            <div id="chatHist" class="chat-msgs"></div>
            <div class="chat-ctrl">
              <div class="chat-para">
                <label>Para:</label>
                <select id="chatPara" onchange="document.getElementById('cerr').classList.remove('on')">
                  <option value="">Todos</option>
                </select>
              </div>
              <div class="chat-msg">
                <textarea id="chatMsg" placeholder="Escribe tu mensaje..."></textarea>
                <button class="send-btn" onclick="sendMsg()">→</button>
              </div>
              <div id="cerr"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <button class="arr al" id="aL" onclick="go(cur-1)">‹</button>
    <button class="arr ar" id="aR" onclick="go(cur+1)">›</button>
  </div>

  <div class="pf">
    <button class="dot on" onclick="go(0)"></button>
    <button class="dot" onclick="go(1)"></button>
    <button class="dot" onclick="go(2)"></button>
    <button class="dot" onclick="go(3)"></button>
    <button class="dot" onclick="go(4)"></button>
  </div>
</div>

<script>
/* ════ CONFIG ════ */
const URLS={
  api:'https://script.google.com/macros/s/AKfycbx7mIcHr7un9_m6iI-cjpiOpaxkznOrIEG2XS4vx7r-_BbtSxcWnLmCLXkm1Xnm_EYB/exec',
  sheet:'https://docs.google.com/spreadsheets/d/1xVkUgM2Sak8m_QHIdn18E1kKiDjuNnZyeG0v1q_DLdM/edit',
  ctrl:0,ctrl1:0,ctrl2:0,ctrl3:0,ctrl4:0
};
URLS[0] = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQic-UoslpzLsVMirSAOXBr7OaE4v8WKLoeHWmVRqjpp7YOc0YVUyYi9E1V1N1snqRoRheiWyg4cFs_/pubhtml?gid=1332474577&single=true';
URLS[1] = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQic-UoslpzLsVMirSAOXBr7OaE4v8WKLoeHWmVRqjpp7YOc0YVUyYi9E1V1N1snqRoRheiWyg4cFs_/pubhtml?gid=427161356&single=true';
URLS[2] = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQic-UoslpzLsVMirSAOXBr7OaE4v8WKLoeHWmVRqjpp7YOc0YVUyYi9E1V1N1snqRoRheiWyg4cFs_/pubhtml?gid=1925991360&single=true';
const USERS=[
  {user:'admin',pass:'Ideas2026$',role:'internal',name:'Admin'},
  {user:'cliente',pass:'Ideas2026$',role:'external',name:'Cliente'}
];
let cur=0,currentUser=null,allUsers=[];
const PNLS=[
  {icon:'📊',name:'Control',hint:'Vincula tus hojas publicadas en: Archivo → Compartir → Publicar en web. Copia la URL aquí en <code>URLS[0]</code>'},
  {icon:'📈',name:'Diagrama Gantt',hint:'Publica tu hoja GANTT y pega la URL en <code>URLS[1]</code>'},
  {icon:'🎯',name:'Dashboard',hint:'Publica tu hoja DASHBOARD y pega la URL en <code>URLS[2]</code>'}
];

function togglePassVis(){
  const passField=document.getElementById('loginPass');
  const toggleBtn=document.getElementById('toggleBtn');
  const isPassword=passField.type==='password';
  passField.type=isPassword?'text':'password';
  toggleBtn.textContent=isPassword?'🔓':'🔒';
}

async function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const errEl=document.getElementById('lerr');
  errEl.classList.remove('on');
  if(!u||!p){errEl.textContent='Completa usuario y contraseña.';errEl.classList.add('on');return}
  
  try{
    const res=await fetch(URLS.api+'?ts='+Date.now());
    const data=await res.json();
    const found=data.users.find(x=>(x.correo===u||x.nombre===u)&&x.pass===p);
    if(!found){errEl.textContent='Usuario o contraseña incorrectos.';errEl.classList.add('on');document.getElementById('loginUser').parentElement.classList.add('shake');return}
    currentUser={name:found.nombre,role:found.rol==='I4L'?'internal':'external',correo:found.correo};
    document.getElementById('login').classList.add('gone');
    document.getElementById('portal').classList.remove('gone');
    if(found.rol==='I4L')document.getElementById('editBtn').style.display='block';
    initPortal();
  }catch(e){
    errEl.textContent='Error al conectar. Intenta de nuevo.';errEl.classList.add('on');
  }
}

function doLogout(){
  currentUser=null;
  document.getElementById('login').classList.remove('gone');
  document.getElementById('portal').classList.add('gone');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginPass').type='password';
}

function openSheet(){
  if(URLS.sheet&&URLS.sheet.trim()!=='')window.open(URLS.sheet,'_blank');
  else alert('Configura URLS.sheet con el link de tu Google Sheet para habilitar la edición rápida.');
}

function initPortal(){
  for(let i=0;i<3;i++){
    const url=URLS[i],fr=document.getElementById('f'+i),
          sh=document.getElementById('s'+i),ph=document.getElementById('p'+i);
    if(url&&url.trim()!==''){
      try{
        fr.addEventListener('load',()=>{try{sh.classList.add('done')}catch(_){}});
        fr.src=url;
      }catch(_){sh.classList.add('done')}
    }else{
      sh.classList.add('done');fr.style.display='none';
      const d=PNLS[i];
      ph.innerHTML=`<div class="plc"><div class="plc-icon">${d.icon}</div><div class="plc-title">${d.name}</div><div class="plc-note">${d.hint}</div></div>`;
    }
  }
  loadData();go(0);
}

async function loadData(){
  const api=URLS.api;
  if(!api||api.trim()===''){renderStatusPH();renderChatPH();return}
  document.getElementById('chatSt').textContent='Cargando...';
  try{
    const res=await fetch(api+'?type=all&ts='+Date.now());
    const data=await res.json();
    allUsers=data.users||[];
    renderStatus(data.status||[]);
    renderMsgs(data.messages||[]);
    renderPrivates(data.privates||[]);
    populatePara(allUsers);
    populateParticipants(allUsers);
    populatePrivates(data.privates||[]);
    document.getElementById('chatSt').textContent='En línea';
  }catch(e){
    renderStatusPH();renderChatPH();
    document.getElementById('chatSt').textContent='Sin conexión';
  }
}

function populatePara(users){
  const sel=document.getElementById('chatPara');
  while(sel.options.length>1)sel.remove(1);
  const myName=currentUser?currentUser.name:'';
  users.forEach(u=>{
    if(u.nombre===myName)return;
    const opt=document.createElement('option');
    opt.value=u.nombre;
    opt.textContent='@ '+u.nombre;
    sel.appendChild(opt);
  });
}

function populateParticipants(users){
  const list=document.getElementById('participantsList');
  if(!users||!users.length){list.innerHTML='';return}
  const myName=currentUser?currentUser.name:'';
  list.innerHTML=users.map(u=>{
    const isI4L=u.rol==='I4L';
    const role=isI4L?'i4l':'cli';
    const isMe=u.nombre===myName;
    const cls=isMe?'active':'';
    return`<div class="participant-item ${cls} ${role}">
      <div class="participant-av ${role}">👤</div>
      <div class="participant-info">
        <div class="participant-name">${esc(u.nombre)}</div>
        <div class="participant-role">${u.rol}</div>
      </div>
      <div class="participant-status">●</div>
    </div>`;
  }).join('');
}

function renderStatus(items){
  const list=document.getElementById('statusList');
  if(!items||!items.length){
    list.innerHTML='<div class="empty-state"><span>📋</span><p>Aún no hay reportes publicados.</p></div>';return;
  }
  list.innerHTML=items.map(s=>`
    <div class="status-item">
      <div class="status-meta">
        <span class="status-author">${esc(s.autor)}</span>
        <span class="status-date">${esc(s.fecha)} ${esc(s.hora)}</span>
      </div>
      <div class="status-text">${esc(s.texto)}</div>
    </div>`).join('');
}

function renderMsgs(items){
  const hist=document.getElementById('chatHist');
  if(!items||!items.length){
    hist.innerHTML='<div class="empty-state"><span>💬</span><p>Aún no hay mensajes. ¡Escribe el primero!</p></div>';return;
  }
  const publicMessages=items.filter(m=>!m.para||m.para==='');
  if(!publicMessages.length){
    hist.innerHTML='<div class="empty-state"><span>💬</span><p>Aún no hay mensajes públicos.</p></div>';return;
  }
  hist.innerHTML=publicMessages.map(m=>{
    const isI4L=m.role==='I4L';
    const cls=isI4L?'i4l':'cli';
    const emit=m.entregado?'✓✓':m.enviado?'✓':'';
    return`<div class="brow ${cls}">
      <div class="av ${cls}">👤</div>
      <div class="bub ${cls}">
        <div class="bub-who">${esc(m.sender)}</div>
        <div class="bub-txt">${esc(m.msg)}</div>
        <div class="bub-ts"><span>${esc(m.fecha)} · ${esc(m.hora)}</span><span class="deliver">${emit}</span></div>
      </div>
    </div>`;
  }).join('');
  hist.scrollTop=hist.scrollHeight;
}

function renderPrivates(items){
  if(!items||!items.length)return;
  const myName=currentUser?currentUser.name:'';
  const myPrivates=items.filter(m=>m.para===myName);
  const hist=document.getElementById('chatHist');
  if(!myPrivates.length&&(!hist.innerHTML||hist.innerHTML.includes('empty-state')))return;
  if(myPrivates.length===0)return;
  const html=myPrivates.map(m=>{
    const isI4L=m.role==='I4L';
    const cls=isI4L?'i4l':'cli';
    const emit=m.entregado?'✓✓':m.enviado?'✓':'';
    return`<div class="brow ${cls}">
      <div class="av ${cls}">👤</div>
      <div class="bub ${cls}">
        <div class="bub-who">${esc(m.sender)} (privado)</div>
        <div class="bub-txt">${esc(m.msg)}</div>
        <div class="bub-ts"><span>${esc(m.fecha)} · ${esc(m.hora)}</span><span class="deliver">${emit}</span></div>
      </div>
    </div>`;
  }).join('');
  hist.innerHTML=(hist.innerHTML||'')+html;
  hist.scrollTop=hist.scrollHeight;
}

function populatePrivates(items){
  const list=document.getElementById('privatesList');
  if(!items||!items.length){list.innerHTML='';return}
  const myName=currentUser?currentUser.name:'';
  const grouped={};
  items.forEach(m=>{
    if(m.para===myName){
      const sender=m.sender;
      if(!grouped[sender])grouped[sender]={count:0,lastMsg:''};
      grouped[sender].count++;
      grouped[sender].lastMsg=m.msg;
    }
  });
  const entries=Object.entries(grouped);
  if(!entries.length){list.innerHTML='';return}
  list.innerHTML=entries.map(([sender,data])=>`
    <div class="participant-item" onclick="filterPrivate('${esc(sender)}')">
      <div class="participant-av priv">👤</div>
      <div class="participant-info">
        <div class="participant-name">${esc(sender)}</div>
        <div class="participant-role">${data.count} msg</div>
      </div>
    </div>`).join('');
}

function filterPrivate(senderName){
  const hist=document.getElementById('chatHist');
  hist.innerHTML='<div class="empty-state"><span>🔒</span><p>Chat privado con '+esc(senderName)+'</p></div>';
}

function renderStatusPH(){document.getElementById('statusList').innerHTML='<div class="empty-state"><span>🔧</span><p>Configura <code>URLS.api</code> para ver los reportes en vivo.</p></div>'}
function renderChatPH(){document.getElementById('chatHist').innerHTML='<div class="empty-state"><span>🔧</span><p>Configura <code>URLS.api</code> para activar el chat en vivo.</p></div>';document.getElementById('chatSt').textContent='No configurado'}

async function sendMsg(){
  if(!currentUser){return}
  const msg=document.getElementById('chatMsg').value.trim();
  const para=document.getElementById('chatPara').value;
  const errEl=document.getElementById('cerr');
  const api=URLS.api;
  errEl.classList.remove('on');
  if(!msg){errEl.textContent='Escribe un mensaje antes de enviar.';errEl.classList.add('on');return}
  if(!api||api.trim()===''){errEl.textContent='El chat aún no está configurado.';errEl.classList.add('on');return}

  const btn=document.querySelector('.send-btn');
  btn.textContent='...';btn.disabled=true;

  const hist=document.getElementById('chatHist');
  if(hist.querySelector('.empty-state'))hist.innerHTML='';
  const isI4L=currentUser.role==='internal';
  const cls=isI4L?'i4l':'cli';
  const div=document.createElement('div');
  div.className='brow '+cls;
  div.innerHTML=`<div class="av ${cls}">👤</div>
    <div class="bub ${cls}"><div class="bub-who">${esc(currentUser.name)}</div>
    <div class="bub-txt">${esc(msg)}</div><div class="bub-ts"><span>Ahora</span><span class="deliver">✓</span></div></div>`;
  hist.appendChild(div);hist.scrollTop=hist.scrollHeight;
  document.getElementById('chatMsg').value='';

  try{
    const res=await fetch(api,{method:'POST',
      body:JSON.stringify({nombre:currentUser.name,mensaje:msg,para,role:currentUser.role==='internal'?'I4L':'cli'})});
    const data=await res.json();
    if(!data.ok){errEl.textContent='Error al enviar. Inténtalo de nuevo.';errEl.classList.add('on')}
    setTimeout(loadData,1800);
  }catch(e){errEl.textContent='No se pudo conectar.';errEl.classList.add('on')}
  finally{btn.textContent='→';btn.disabled=false}
}

function go(index){
  cur=Math.max(0,Math.min(4,index));
  document.getElementById('slider').style.transform=`translateX(-${cur*20}%)`;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===cur));
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===cur));
  document.getElementById('aL').disabled=(cur===0);
  document.getElementById('aR').disabled=(cur===4);
  if((cur===3||cur===4)&&URLS.api)loadData();
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('portal').classList.contains('gone'))return;
  if(e.key==='ArrowRight')go(cur+1);if(e.key==='ArrowLeft')go(cur-1);
});

let sx=0;
const pmEl=document.getElementById('pm');
pmEl.addEventListener('touchstart',e=>{sx=e.touches[0].clientX},{passive:true});
pmEl.addEventListener('touchend',e=>{const dx=sx-e.changedTouches[0].clientX;if(Math.abs(dx)>44)go(dx>0?cur+1:cur-1)},{passive:true});

document.getElementById('chatMsg').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}});

function esc(t){if(!t)return'';return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
